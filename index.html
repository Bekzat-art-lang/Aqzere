<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кешірім сұрау</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, pink, lightpink);
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* контейнер */
.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

h1 {
    font-size: 26px;
    margin: 10px;
}

p {
    font-size: 18px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

#yes {
    background: green;
    color: white;
}

#no {
    background: red;
    color: white;
    position: absolute;
}

/* жүректер */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Ақзере ренжімеш 😢</h1>
    <p id="text">Кешіресің ба?</p>

    <button id="yes">Ия</button>
    <button id="no">Жоқ</button>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
const noBtn = document.getElementById("no");
const music = document.getElementById("music");

// мобильде де қашу (touch)
function moveButton() {
    let x = Math.random() * (window.innerWidth - 80);
    let y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// ПК үшін
noBtn.addEventListener("mouseover", moveButton);

// Телефон үшін
noBtn.addEventListener("touchstart", moveButton);

// Ия басқанда
document.getElementById("yes").addEventListener("click", () => {
    document.getElementById("title").innerText = "Рахмет алтыным ❤️";
    document.getElementById("text").innerText = "";

    music.play();

    setInterval(createHeart, 300);
});

// жүрек
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}
</script>

</body>
</html>
